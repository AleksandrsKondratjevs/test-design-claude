<div attr="data.main.attributes" ko-style="data.main.style" css="data.main.css">
    <h2 if="data.main.attributes()['data-block-title']" class="content-block-title"
        data-bind="text: data.main.attributes()['data-block-title']"></h2>
    <p if="data.main.attributes()['data-block-subtitle']" class="content-block-subtitle"
       data-bind="text: data.main.attributes()['data-block-subtitle']"></p>
    <ul role="tablist" class="tabs-navigation with-image" each="contentType.getChildren()" attr="data.navigation.attributes" ko-style="data.navigation.style" css="data.navigation.css">
        <with args="content">
            <li role="tab" class="tab-header with-image"
                attr="Object.assign({}, contentType.parentContentType.content.data.headers.attributes(), { active: getData().default_active_tab })"
                css="contentType.parentContentType.content.data.headers.css"
                ko-style="{ '--tab-bg': contentType.parentContentType.content.data.main.attributes()['data-background_color'] }"
            >
                <a href="#no-tab" class="tab-title" attr="{ href: '#' + contentType.id }">
                    <div if="data.main.attributes()['src']" class="tab-image">
                        <img data-bind="attr: { src: data.main.attributes()['src'] }" />
                    </div>
                    <span class="tab-title" text="getData().tab_name"></span>
                </a>
            </li>
        </with>
    </ul>
    <div class="tabs-content" attr="data.content.attributes" ko-style="data.content.style" css="data.content.css">
        <render args="masterTemplate"></render>
    </div>
</div>
